<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tus-server-r2 — Upload Example</title>
  <link href="https://releases.transloadit.com/uppy/v5.2.4/uppy.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #666;
      font-size: 0.9rem;
    }

    header a { color: #0070f3; text-decoration: none; }
    header a:hover { text-decoration: underline; }

    .endpoint-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .endpoint-row input {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: monospace;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .endpoint-row input:focus { border-color: #0070f3; }

    .endpoint-row button {
      padding: 0.6rem 1.2rem;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .endpoint-row button:hover { background: #005ed4; }

    #uppy-container { margin-bottom: 1.5rem; }

    .uppy-Dashboard { border-radius: 8px; }

    .log {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      min-height: 80px;
    }

    .log h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .log-empty {
      color: #aaa;
      font-size: 0.9rem;
    }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-entry .badge {
      flex-shrink: 0;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-success { background: #d4f7dc; color: #1a7a33; }
    .badge-error   { background: #fde8e8; color: #c0392b; }

    .log-entry .key {
      font-family: monospace;
      word-break: break-all;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>tus-server-r2 — Upload Example</h1>
      <p>
        Deploy your own TUS server with
        <a href="https://github.com/aiodintsov/tus-server-r2" target="_blank">tus-server-r2</a>,
        paste the endpoint below, and upload files to test it.
      </p>
    </header>

    <div class="endpoint-row">
      <input
        type="url"
        id="endpoint"
        placeholder="https://my-uploader.<account>.workers.dev"
        spellcheck="false"
        autocomplete="off"
      >
      <button id="apply-btn">Apply</button>
    </div>

    <div id="uppy-container"></div>

    <div class="log">
      <h2>Completed uploads</h2>
      <div id="log-body">
        <p class="log-empty">Completed uploads will appear here.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { Uppy, Dashboard, Tus } from 'https://releases.transloadit.com/uppy/v5.2.4/uppy.min.mjs'

    const STORAGE_KEY = 'tus-server-r2-endpoint'

    const endpointInput = document.getElementById('endpoint')
    const applyBtn = document.getElementById('apply-btn')
    const logBody = document.getElementById('log-body')

    // Restore saved endpoint
    const saved = localStorage.getItem(STORAGE_KEY)
    if (saved) endpointInput.value = saved

    let uppy = null

    function initUppy(endpoint) {
      if (uppy) uppy.destroy()

      uppy = new Uppy({ autoProceed: false })
        .use(Dashboard, {
          inline: true,
          target: '#uppy-container',
          proudlyDisplayPoweredByUppy: false,
          height: 380,
        })
        .use(Tus, {
          endpoint: endpoint || 'https://your-worker.workers.dev',
          retryDelays: [0, 1000, 3000, 5000],
        })

      uppy.on('upload-success', (file, response) => {
        addLogEntry('success', file.name, response.uploadURL)
      })

      uppy.on('upload-error', (file, error) => {
        addLogEntry('error', file.name, error.message)
      })
    }

    function addLogEntry(type, filename, detail) {
      const empty = logBody.querySelector('.log-empty')
      if (empty) empty.remove()

      const entry = document.createElement('div')
      entry.className = 'log-entry'
      entry.innerHTML = `
        <span class="badge badge-${type}">${type === 'success' ? 'OK' : 'ERR'}</span>
        <span class="key">${escapeHtml(filename)} → ${escapeHtml(detail ?? '')}</span>
      `
      logBody.prepend(entry)
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    applyBtn.addEventListener('click', () => {
      const url = endpointInput.value.trim()
      localStorage.setItem(STORAGE_KEY, url)
      initUppy(url)
    })

    endpointInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyBtn.click()
    })

    // Init on load
    initUppy(saved || '')
  </script>
</body>
</html>
